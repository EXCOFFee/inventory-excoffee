# ============================================
# Docker Compose para Desarrollo - InventoryPro
# ============================================
# Solo levanta PostgreSQL para desarrollo local
# El frontend y backend se ejecutan con npm run dev
#
# Uso:
#   docker-compose -f docker-compose.dev.yml up -d
#   cd backend && npm run dev
#   cd frontend && npm run dev

services:
  # ============================================
  # BASE DE DATOS - PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: inventorypro-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory_pro
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================
  # ADMINER - Interfaz web para la DB (opcional)
  # ============================================
  adminer:
    image: adminer:latest
    container_name: inventorypro-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data_dev:
    driver: local
